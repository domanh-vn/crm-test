<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LUX CRM - Đăng nhập</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?q=80&w=2574&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        .login-overlay {
            background: linear-gradient(135deg, rgba(250,250,249,0.9) 0%, rgba(250,250,249,0.6) 100%);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen font-body-md text-on-surface flex items-center justify-center p-4">

<div class="absolute inset-0 login-overlay -z-10"></div>

<div class="glass-card w-full max-w-md rounded-2xl p-10 shadow-2xl relative overflow-hidden">
    <!-- Top accent line -->
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#D4A574] to-[#C49564]"></div>

    <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mx-auto mb-4 border border-primary/20">
            <span class="material-symbols-outlined text-[32px] text-primary">eco</span>
        </div>
        <h1 class="font-headline-lg text-[28px] font-light text-[#2C2925] tracking-tight">Yến Sào Vĩnh Hưng</h1>
        <p class="font-label-md text-[12px] uppercase tracking-widest text-secondary mt-2">Hệ Thống Quản Lý CRM</p>
    </div>

    <form onsubmit="event.preventDefault(); window.location.href='index.html';" class="space-y-5">
        <div>
            <label class="block text-[14px] font-medium text-[#2C2925] mb-1.5">Email đăng nhập</label>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-2.5 text-secondary text-[20px]">mail</span>
                <input type="email" required class="w-full border border-[#E8E4DF] bg-white/50 rounded-lg py-2.5 pl-10 pr-4 outline-none focus:border-primary focus:bg-white transition-all placeholder:text-secondary/50" placeholder="admin@yensao.com">
            </div>
        </div>
        
        <div>
            <div class="flex justify-between items-center mb-1.5">
                <label class="block text-[14px] font-medium text-[#2C2925]">Mật khẩu</label>
                <a href="#" class="text-[12px] text-primary hover:underline">Quên mật khẩu?</a>
            </div>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-2.5 text-secondary text-[20px]">lock</span>
                <input type="password" required class="w-full border border-[#E8E4DF] bg-white/50 rounded-lg py-2.5 pl-10 pr-4 outline-none focus:border-primary focus:bg-white transition-all placeholder:text-secondary/50" placeholder="••••••••">
            </div>
        </div>

        <button type="submit" class="w-full bg-[#D4A574] hover:bg-[#C49564] text-white py-3 rounded-lg font-medium text-[15px] transition-all transform hover:-translate-y-0.5 shadow-lg shadow-primary/20 mt-4">
            Đăng nhập hệ thống
        </button>

        <div class="relative flex items-center py-4">
            <div class="flex-grow border-t border-[#E8E4DF]"></div>
            <span class="flex-shrink-0 mx-4 text-secondary text-[12px] uppercase">Hoặc</span>
            <div class="flex-grow border-t border-[#E8E4DF]"></div>
        </div>

        <button type="button" onclick="window.location.href='index.html';" class="w-full bg-white hover:bg-[#FAFAF9] border border-[#E8E4DF] text-[#2C2925] py-2.5 rounded-lg font-medium text-[14px] transition-all flex items-center justify-center gap-2">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
            Tiếp tục với Google
        </button>
    </form>
</div>

</body>
</html>
