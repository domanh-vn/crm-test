<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LUX CRM - Công việc</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen font-body-md text-on-surface">

<aside class="fixed left-0 top-0 h-screen w-[240px] bg-white/95 backdrop-blur-md border-r border-[#E8E4DF] shadow-xl flex flex-col py-8 px-4 gap-8 z-50">
    <div class="flex flex-col items-center gap-4 mb-4">
        <div class="text-center">
            <h2 class="font-headline-sm text-[18px] font-medium text-primary">Yến Sào Vĩnh Hưng</h2>
            <p class="font-label-md text-[12px] uppercase tracking-widest text-secondary mt-1">Hệ Thống CRM</p>
        </div>
    </div>
    
    <nav class="flex-1 flex flex-col gap-2">
        <a href="index.html" class="flex items-center gap-4 py-3 px-4 rounded-lg text-secondary opacity-70 hover:text-primary hover:bg-primary/5 transition-all duration-300">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="font-label-md text-[14px]">Tổng quan</span>
        </a>
        <a href="kanban.html" class="flex items-center gap-4 py-3 px-4 rounded-lg text-secondary opacity-70 hover:text-primary hover:bg-primary/5 transition-all duration-300">
            <span class="material-symbols-outlined">view_kanban</span>
            <span class="font-label-md text-[14px]">Cơ hội</span>
        </a>
        <a href="tasks.html" class="flex items-center gap-4 py-3 px-4 rounded-lg text-primary font-bold border-l-4 border-primary bg-[#FFF8E8] transition-all duration-300">
            <span class="material-symbols-outlined">check_circle</span>
            <span class="font-label-md text-[14px]">Công việc</span>
        </a>
        <a href="customers.html" class="flex items-center gap-4 py-3 px-4 rounded-lg text-secondary opacity-70 hover:text-primary hover:bg-primary/5 transition-all duration-300">
            <span class="material-symbols-outlined">group</span>
            <span class="font-label-md text-[14px]">Danh sách</span>
        </a>
        <a href="payments.html" class="flex items-center gap-4 py-3 px-4 rounded-lg text-secondary opacity-70 hover:text-primary hover:bg-primary/5 transition-all duration-300">
            <span class="material-symbols-outlined">payments</span>
            <span class="font-label-md text-[14px]">Thanh toán</span>
        </a>
        <a href="settings.html" class="flex items-center gap-4 py-3 px-4 rounded-lg text-secondary opacity-70 hover:text-primary hover:bg-primary/5 transition-all duration-300">
            <span class="material-symbols-outlined">settings</span>
            <span class="font-label-md text-[14px]">Cài đặt</span>
        </a>
    </nav>
    <div class="flex flex-col gap-2 border-t border-[#E8E4DF] pt-6">
        <a href="login.html" class="flex items-center gap-4 py-2 px-4 rounded-lg text-secondary opacity-70 hover:text-error transition-all">
            <span class="material-symbols-outlined">logout</span>
            <span class="font-label-md text-[14px]">Đăng xuất</span>
        </a>
    </div>
</aside>

<main class="ml-[240px] flex-1 flex flex-col h-screen">
    <header class="bg-white/95 backdrop-blur-md h-[64px] px-8 flex justify-between items-center sticky top-0 z-40 shadow-sm border-b border-[#E8E4DF]">
        <div class="flex items-center gap-4">
            <div class="flex items-center bg-[#FAFAF9] border border-[#E8E4DF] px-4 py-2 rounded-full w-96">
                <span class="material-symbols-outlined text-secondary mr-2">search</span>
                <input class="bg-transparent border-none focus:ring-0 text-body-md w-full outline-none" placeholder="Tìm kiếm công việc..." type="text"/>
            </div>
        </div>
        <div class="flex items-center gap-6 relative">
            <button onclick="showToast('Bạn không có thông báo mới', 'success')" class="relative text-secondary hover:text-primary hover:bg-primary/5 p-2 rounded-full transition-colors">
                <span class="material-symbols-outlined">notifications</span>
                <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-error rounded-full"></span>
            </button>
            <button onclick="window.location.href='settings.html'" class="relative text-secondary hover:text-primary hover:bg-primary/5 p-2 rounded-full transition-colors">
                <span class="material-symbols-outlined">settings</span>
            </button>
            <div class="flex items-center gap-3 pl-4 border-l border-[#E8E4DF] cursor-pointer hover:opacity-80 transition-opacity" onclick="window.location.href='settings.html'">
                <div class="text-right">
                    <p class="font-label-md text-[14px] text-on-surface leading-tight font-medium">Nguyễn Phước Vĩnh Hưng</p>
                    <p class="font-label-md text-[12px] text-secondary">Quản trị viên</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center font-bold text-primary border border-primary/30">
                    VH
                </div>
            </div>
        </div>
    </header>

    <div class="p-8 flex-1 max-w-[1440px] mx-auto w-full space-y-8">
        <section class="flex justify-between items-end">
            <div>
                <h1 class="font-headline-lg text-[32px] font-light text-[#2C2925] tracking-tight">Công việc</h1>
                <div class="flex gap-2 mt-6 border-b border-[#E8E4DF]" id="task-tabs">
                    <button class="tab-btn active px-6 py-3 font-medium text-[14px] text-primary border-b-2 border-primary" data-filter="all">Tất cả</button>
                    <button class="tab-btn px-6 py-3 font-medium text-[14px] text-secondary hover:text-primary" data-filter="late">Trễ hạn</button>
                    <button class="tab-btn px-6 py-3 font-medium text-[14px] text-secondary hover:text-primary" data-filter="pending">Đang xử lý</button>
                    <button class="tab-btn px-6 py-3 font-medium text-[14px] text-secondary hover:text-primary" data-filter="done">Hoàn thành</button>
                </div>
            </div>
            <div class="text-right mb-4">
                <button onclick="openModal('addTaskModal')" class="bg-[#D4A574] hover:bg-[#C49564] text-white px-6 py-2.5 rounded-lg font-medium text-[14px] transition-colors flex items-center gap-2">
                    <span class="material-symbols-outlined text-[20px]">add</span>
                    Thêm công việc
                </button>
            </div>
        </section>

        <section class="glass-card rounded-xl p-6" id="tasks-container">
            <!-- Rendered via JS -->
        </section>
    </div>
</main>

<!-- Add Task Modal -->
<div id="addTaskModal" class="modal-overlay fixed inset-0 z-[100] flex items-center justify-center">
    <div class="modal-content bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden border border-[#E8E4DF]">
        <div class="px-6 py-4 border-b border-[#E8E4DF] flex justify-between items-center">
            <h3 class="font-headline-sm text-[20px] text-[#2C2925]">Thêm công việc mới</h3>
            <button class="close-modal text-secondary hover:text-error transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-[14px] font-medium text-[#2C2925] mb-1">Tiêu đề *</label>
                <input type="text" id="taskTitle" class="w-full border border-[#E8E4DF] rounded-lg p-2.5 outline-none focus:border-primary" placeholder="Nhập tiêu đề công việc">
            </div>
            <div>
                <label class="block text-[14px] font-medium text-[#2C2925] mb-1">Hạn chót *</label>
                <input type="date" id="taskDate" class="w-full border border-[#E8E4DF] rounded-lg p-2.5 outline-none focus:border-primary">
            </div>
        </div>
        <div class="px-6 py-4 bg-[#FAFAF9] border-t border-[#E8E4DF] flex justify-end gap-3">
            <button class="close-modal px-5 py-2 rounded-lg text-secondary hover:bg-white border border-transparent hover:border-[#E8E4DF] transition-colors font-medium">Hủy</button>
            <button id="saveTaskBtn" class="bg-[#D4A574] hover:bg-[#C49564] text-white px-5 py-2 rounded-lg font-medium transition-colors">Tạo công việc</button>
        </div>
    </div>
</div>

<script src="js/mock-api.js"></script>
<script src="js/app.js"></script>
<script>
let currentFilter = 'all';

document.addEventListener('DOMContentLoaded', () => {
    renderTasks();
    
    // Tab logic
    const tabs = document.querySelectorAll('#task-tabs .tab-btn');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => {
                t.className = 'tab-btn px-6 py-3 font-medium text-[14px] text-secondary hover:text-primary';
            });
            tab.className = 'tab-btn active px-6 py-3 font-medium text-[14px] text-primary border-b-2 border-primary';
            currentFilter = tab.dataset.filter;
            renderTasks();
        });
    });
    
    document.getElementById('saveTaskBtn').addEventListener('click', () => {
        const title = document.getElementById('taskTitle').value;
        if(!title) {
            showToast('Vui lòng nhập tiêu đề', 'error');
            return;
        }
        
        const tasks = window.api.getTasks();
        tasks.push({
            id: 'T' + Date.now(),
            title: title,
            status: 'pending',
            priority: 'medium',
            due: document.getElementById('taskDate').value || 'Hôm nay'
        });
        window.api.saveData({ ...window.api.getData(), tasks });
        
        closeModal('addTaskModal');
        document.getElementById('taskTitle').value = '';
        renderTasks();
        showToast('Thêm công việc thành công!');
    });
});

function renderTasks() {
    let tasks = window.api.getTasks();
    
    // Filter
    if (currentFilter === 'late') {
        tasks = tasks.filter(t => t.due.includes('Trễ'));
    } else if (currentFilter === 'pending') {
        tasks = tasks.filter(t => t.status === 'pending');
    } else if (currentFilter === 'done') {
        tasks = tasks.filter(t => t.status === 'done');
    }
    
    const container = document.getElementById('tasks-container');
    
    if(tasks.length === 0) {
        container.innerHTML = `<div class="text-center text-secondary py-8">Chưa có công việc nào</div>`;
        return;
    }
    
    container.innerHTML = tasks.map(task => {
        const isDone = task.status === 'done';
        const isLate = task.due.includes('Trễ');
        
        let priorityDot = 'bg-[#10B981]'; // Thấp - Xanh
        if (task.priority === 'high') priorityDot = 'bg-error'; // Đỏ
        else if (task.priority === 'medium') priorityDot = 'bg-[#F59E0B]'; // Vàng
        
        return `
        <div class="flex items-center justify-between p-4 border-b border-[#E8E4DF] last:border-0 hover:bg-[#FAFAF9] transition-colors group">
            <div class="flex items-start gap-4">
                <button onclick="toggleTask('${task.id}')" class="mt-1 flex-shrink-0 w-6 h-6 rounded border ${isDone ? 'bg-[#D4A574] border-[#D4A574] text-white' : 'border-[#E8E4DF] bg-white'} flex items-center justify-center transition-colors">
                    ${isDone ? '<span class="material-symbols-outlined text-[16px]">check</span>' : ''}
                </button>
                <div>
                    <h4 class="text-[16px] font-medium ${isDone ? 'text-secondary line-through' : 'text-[#2C2925]'}">${task.title}</h4>
                    <div class="flex items-center gap-4 mt-1">
                        <span class="text-[12px] ${isDone ? 'text-secondary' : (isLate ? 'text-error' : 'text-secondary')} flex items-center gap-1">
                            <span class="material-symbols-outlined text-[14px]">schedule</span>
                            ${task.due}
                        </span>
                        <div class="flex items-center gap-1">
                            <div class="w-2 h-2 rounded-full ${priorityDot}"></div>
                            <span class="text-[12px] text-secondary">Ưu tiên ${task.priority === 'high' ? 'cao' : (task.priority === 'medium' ? 'vừa' : 'thấp')}</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="opacity-0 group-hover:opacity-100 transition-opacity flex gap-2">
                <button onclick="showToast('Tính năng đang phát triển', 'success')" class="p-2 text-secondary hover:text-primary"><span class="material-symbols-outlined text-[18px]">edit</span></button>
                <button onclick="deleteTask('${task.id}')" class="p-2 text-secondary hover:text-error"><span class="material-symbols-outlined text-[18px]">delete</span></button>
            </div>
        </div>
        `;
    }).join('');
}

window.toggleTask = function(taskId) {
    window.api.toggleTask(taskId);
    renderTasks();
};

window.deleteTask = function(taskId) {
    if(confirm('Bạn có chắc muốn xóa công việc này?')) {
        window.api.deleteTask(taskId);
        renderTasks();
        showToast('Đã xóa công việc');
    }
}
</script>
</body>
</html>
